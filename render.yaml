# Public demo deploy for recruiters — https://render.com/docs/blueprint-spec
# After connecting GitHub, set OPENAI_API_KEY in the Render dashboard (required for meal logging).

databases:
  - name: diet-db
    databaseName: diet_recommendation_db
    plan: free

services:
  - type: web
    name: diet-recommendation-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head && python scripts/seed_foods.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: diet-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: https://diet-recommendation-web.onrender.com
      - key: PYTHON_VERSION
        value: 3.12.3

  - type: web
    name: diet-recommendation-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://diet-recommendation-api.onrender.com/api/v1
